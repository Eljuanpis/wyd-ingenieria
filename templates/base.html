<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}W&D INGENIERÍA{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <header class="navbar">
        <a href="{{ url_for('index') }}"></a>
        <nav class="nav-links">
            <a href="{{ url_for('index') }}">Inicio</a>
            <a href="{{ url_for('ingenieria') }}">Ingeniería</a>
            <a href="{{ url_for('montajes') }}">Montajes</a>
            <a href="{{ url_for('mecanica') }}">Mecánica</a>
            <a href="{{ url_for('metalmecanica') }}">Metalmecánica</a>
            <a href="{{ url_for('energia') }}">Energía</a>
            <a href="{{ url_for('construccion') }}">Construcción</a>
        </nav>
        <div class="hamburger">&#9776;</div> 
    </header>

    {% block content %}{% endblock %}

    <footer>
        <p>&copy; 2026 W&D INGENIERÍA S.A.S. Todos los derechos reservados.</p>
    </footer>

    <script>
        document.querySelector('.hamburger').addEventListener('click', () => {
            document.querySelector('.nav-links').classList.toggle('active');
        });
    </script>
</body>
</html>
